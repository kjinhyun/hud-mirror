<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="manifest" href="manifest.json">
  
  <title>HUD Mirror (Standalone)</title>
  <style>
/* ========================================
   HUD Mirror — Native HUD Design System
   Kkot-bun (Frontend Lead) Design Framework
   ======================================== */

:root {
  /* HUD Color Palette */
  --hud-green: #00ff88;
  --hud-cyan: #00d4ff;
  --hud-amber: #ffaa00;
  --hud-red: #ff4444;
  --hud-bg: #000000;
  --hud-bg-overlay: rgba(0, 0, 0, 0.75);
  --hud-text: #ffffff;
  --hud-text-dim: rgba(255, 255, 255, 0.5);

  /* Typography */
  --font-mono: 'Courier New', 'Menlo', monospace;
  --font-ui: -apple-system, 'Segoe UI', sans-serif;

  /* Spacing */
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);

  /* Touch targets — minimum 48px for driving */
  --touch-min: 48px;

  /* Glow effects */
  --glow-green: 0 0 12px rgba(0, 255, 136, 0.6);
  --glow-cyan: 0 0 12px rgba(0, 212, 255, 0.6);
}

/* ===== Reset ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  height: 100%;
  overflow: hidden;
  touch-action: none;
}

body {
  background: var(--hud-bg);
  color: var(--hud-text);
  font-family: var(--font-ui);
  user-select: none;
  -webkit-user-select: none;
}

/* ===== Mirror Engine ===== */
.mirrored {
  transform: scaleX(-1);
}

/* Counter-mirror for elements that should read normally in mirror mode */
.mirror-active .no-mirror {
  transform: scaleX(-1);
}

/* ===== #app Layout (3-row: top / map / bottom) ===== */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* ===== Safety Warning Overlay ===== */
#safety-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.9);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
}

.safety-box {
  max-width: 320px;
  width: 85%;
  text-align: center;
  padding: 2rem;
  background: rgba(10, 10, 20, 0.95);
  border-radius: 16px;
  border: 1px solid var(--hud-green);
  box-shadow: var(--glow-green);
}

.safety-box h2 {
  margin-bottom: 1rem;
  color: var(--hud-green);
  font-size: 1.4rem;
}

.safety-box p {
  margin-bottom: 1.5rem;
  line-height: 1.7;
  font-size: 0.95rem;
  color: #bbb;
}

.safety-box button {
  background: var(--hud-green);
  color: #000;
  padding: 14px 40px;
  border: none;
  border-radius: 8px;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  min-height: var(--touch-min);
}

/* ===== HUD Top Bar (Time + Compass, symmetric) ===== */
#hud-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 16px;
  background: var(--hud-bg-overlay);
  flex-shrink: 0;
  z-index: 50;
  min-height: var(--touch-min);
}

.hud-top-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.hud-top-center {
  flex: 1;
  text-align: center;
}

.hud-top-icon {
  font-size: 1.1rem;
}

.hud-top-value {
  font-family: var(--font-mono);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--hud-green);
  text-shadow: var(--glow-green);
  letter-spacing: 1px;
}

#compass-value {
  color: var(--hud-cyan);
  text-shadow: var(--glow-cyan);
}

#altitude-value {
  font-size: 0.9rem;
  color: var(--hud-text-dim);
}

/* ===== Map Container (fills available space) ===== */
#map-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: var(--hud-bg);
}

#map {
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* ===== Map Search Overlay ===== */
#map-search {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 8px;
  background: rgba(0, 0, 0, 0.85);
}

#search-form {
  display: flex;
  gap: 6px;
}

#search-input {
  flex: 1;
  background: rgba(20, 20, 40, 0.9);
  border: 1px solid #333;
  color: #fff;
  padding: 12px 14px;
  border-radius: 8px;
  font-size: 1rem;
  outline: none;
  min-height: var(--touch-min);
}

#search-input:focus {
  border-color: var(--hud-cyan);
}

#search-form button {
  background: var(--hud-cyan);
  color: #000;
  border: none;
  padding: 0 16px;
  border-radius: 8px;
  font-size: 1.2rem;
  cursor: pointer;
  min-height: var(--touch-min);
  min-width: var(--touch-min);
}

#search-close {
  background: rgba(255, 255, 255, 0.1) !important;
  color: #fff !important;
}

#search-results {
  max-height: 40vh;
  overflow-y: auto;
  margin-top: 6px;
}

.search-result-item {
  padding: 14px 16px;
  background: rgba(20, 20, 40, 0.8);
  border-bottom: 1px solid #222;
  cursor: pointer;
  color: #ddd;
  font-size: 0.95rem;
  min-height: var(--touch-min);
  display: flex;
  align-items: center;
}

.search-result-item:active {
  background: rgba(0, 212, 255, 0.15);
}

.search-result-name {
  font-weight: 600;
  color: #fff;
}

.search-result-addr {
  font-size: 0.8rem;
  color: #888;
  margin-top: 2px;
}

/* ===== Speed Overlay (large, centered on map) ===== */
#speed-overlay {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  text-align: center;
  pointer-events: none;
}

.speed-number {
  font-family: var(--font-mono);
  font-size: 4rem;
  font-weight: 900;
  color: var(--hud-green);
  text-shadow: var(--glow-green);
  line-height: 1;
}

.speed-unit {
  font-family: var(--font-mono);
  font-size: 1rem;
  color: var(--hud-text-dim);
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* ===== HUD Bottom Bar ===== */
#hud-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  background: var(--hud-bg-overlay);
  flex-shrink: 0;
  z-index: 50;
  gap: 8px;
  min-height: var(--touch-min);
}

.hud-bottom-info {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 0.85rem;
  color: var(--hud-text-dim);
  flex-shrink: 0;
}

.hud-sep {
  color: #333;
}

.hud-bottom-controls {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: nowrap;
}

.hud-btn {
  background: transparent;
  border: 1px solid rgba(0, 255, 136, 0.4);
  color: var(--hud-green);
  padding: 10px 12px;
  border-radius: 8px;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  min-height: var(--touch-min);
  min-width: var(--touch-min);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}

.hud-btn:active {
  background: rgba(0, 255, 136, 0.15);
}

#brightness-slider {
  flex: 1;
  min-width: 60px;
  max-width: 120px;
  accent-color: var(--hud-cyan);
  height: var(--touch-min);
}

/* ===== Mirror Active States ===== */
.mirror-active #btn-mirror {
  background: rgba(0, 255, 136, 0.2);
  border-color: var(--hud-green);
}

/* ===== HUD Mode (fullscreen driving mode) ===== */
.hud-mode #hud-bottom .hud-bottom-controls {
  /* In HUD mode, show only essential controls */
}

.hud-mode #hud-bottom-info {
  display: flex !important;
}

.hud-mode #speed-overlay {
  display: block !important;
}

.hud-mode .hud-top-value {
  font-size: 1.5rem;
}

.hud-mode .speed-number {
  font-size: 5rem;
}

.hud-mode #map {
  filter: brightness(1.2) contrast(1.1) saturate(0.8);
}

/* ===== Kakao Maps Overrides for HUD dark theme ===== */
.kakao-control-zoom {
  position: absolute;
  bottom: 80px;
  right: 8px;
  z-index: 10;
}

/* 카카오 지도 저작권 숨김 */
#mCSL, .copyright_info {
  display: none !important;
}

/* 카카오 지도 커스텀 마커 스타일 */
.hud-user-marker {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--hud-cyan);
  border: 2px solid #fff;
  box-shadow: 0 0 12px var(--hud-cyan);
}

/* ===== Turn-by-Turn Navigation Banner ===== */
#nav-banner {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: linear-gradient(180deg, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.8) 100%);
  border-bottom: 1px solid rgba(0, 212, 255, 0.3);
  min-height: 72px;
}

.nav-turn-icon {
  font-size: 2rem;
  flex-shrink: 0;
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  filter: drop-shadow(0 0 8px rgba(0, 212, 255, 0.6));
}

.nav-info {
  flex: 1;
  min-width: 0;
}

.nav-instruction {
  font-size: 1.1rem;
  font-weight: 700;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.nav-road {
  font-size: 0.8rem;
  color: var(--hud-text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}

.nav-eta {
  text-align: right;
  flex-shrink: 0;
}

.nav-distance {
  font-family: var(--font-mono);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--hud-cyan);
  text-shadow: var(--glow-cyan);
}

.nav-eta-time {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  color: var(--hud-text-dim);
  margin-top: 2px;
}

.nav-stop-btn {
  flex-shrink: 0;
  background: rgba(255, 68, 68, 0.2);
  border: 1px solid rgba(255, 68, 68, 0.5);
  color: var(--hud-red);
  width: var(--touch-min);
  height: var(--touch-min);
  border-radius: 8px;
  font-size: 1.2rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.nav-stop-btn:active {
  background: rgba(255, 68, 68, 0.4);
}

/* ===== Navigation Approach Warning (large, centered) ===== */
#nav-approach {
  position: absolute;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 90;
  text-align: center;
  pointer-events: none;
  padding: 16px 32px;
  background: rgba(0, 0, 0, 0.85);
  border-radius: 12px;
  border: 2px solid var(--hud-amber);
  box-shadow: 0 0 20px rgba(255, 170, 0, 0.4);
  display: none;
}

#nav-approach.active {
  display: block;
}

.nav-approach-distance {
  font-family: var(--font-mono);
  font-size: 3rem;
  font-weight: 900;
  color: var(--hud-amber);
  text-shadow: 0 0 16px rgba(255, 170, 0, 0.6);
  line-height: 1;
}

.nav-approach-instruction {
  font-size: 1rem;
  color: #fff;
  margin-top: 6px;
}

/* ===== HUD Mode Navigation Enhancements ===== */
.hud-mode #nav-banner {
  padding: 8px 16px;
  min-height: 64px;
}

.hud-mode .nav-turn-icon {
  font-size: 2.4rem;
}

.hud-mode .nav-instruction {
  font-size: 1.3rem;
}

.hud-mode .nav-distance {
  font-size: 1.6rem;
}

.hud-mode #nav-approach .nav-approach-distance {
  font-size: 4rem;
}

/* Navigation active state — adjust speed overlay position */
.nav-active #speed-overlay {
  bottom: 16px;
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar {
  width: 4px;
}
::-webkit-scrollbar-track {
  background: transparent;
}
::-webkit-scrollbar-thumb {
  background: #333;
  border-radius: 2px;
}

/* ===== Orientation: allow both portrait and landscape ===== */
@media (orientation: landscape) {
  #hud-top {
    padding: 4px 16px;
    min-height: var(--touch-min);
  }
  .hud-top-value {
    font-size: 1.1rem;
  }
  #hud-bottom {
    padding: 4px 12px;
    min-height: var(--touch-min);
  }
  .hud-btn {
    padding: 6px 10px;
    font-size: 0.75rem;
  }
  .speed-number {
    font-size: 3.5rem;
  }
}

  </style>
</head>

  <script>
/**
 * MirrorEngine — 좌우 반전 엔진
 * HUD Mirror PWA의 핵심: 화면 좌우 반전 기능
 */

class MirrorEngine {
  constructor(container) {
    if (!container || !(container instanceof HTMLElement)) {
      throw new Error('MirrorEngine requires a valid DOM container element');
    }
    this.container = container;
    this._enabled = false;
  }

  /** 미러 토글 — 활성화 여부 반환 */
  toggle() {
    this._enabled = !this._enabled;

    if (this._enabled) {
      this.container.classList.add('mirrored');
    } else {
      this.container.classList.remove('mirrored');
    }

    const event = new CustomEvent('mirrortoggle', {
      detail: { enabled: this._enabled }
    });
    this.container.dispatchEvent(event);

    return this._enabled;
  }

  isEnabled() {
    return this._enabled;
  }

  /**
   * 터치 이벤트 좌표를 반전시킨 객체 반환
   * 반전 모드일 때 iframe 내부의 터치 위치를 보정하는 용도
   */
  remapTouchEvent(event) {
    if (!this._enabled || !event) {
      return event;
    }

    const touches = event.touches ? Array.from(event.touches) : [];
    const changedTouches = event.changedTouches ? Array.from(event.changedTouches) : [];
    const screenWidth = window.innerWidth;

    const remapPoint = (point) => {
      if (!point || typeof point.clientX !== 'number') return point;
      const remapped = Object.assign({}, point, {
        clientX: screenWidth - point.clientX
      });
      if (typeof point.pageX === 'number') {
        remapped.pageX = window.pageXOffset + (screenWidth - (point.pageX - window.pageXOffset));
      }
      if (typeof point.screenX === 'number') {
        remapped.screenX = screen.width - point.screenX;
      }
      return remapped;
    };

    const remapped = {
      type: event.type,
      target: event.target,
      currentTarget: event.currentTarget,
      bubbles: event.bubbles,
      cancelable: event.cancelable,
      timestamp: event.timestamp,
      touches: touches.map(remapPoint),
      targetTouches: event.targetTouches ? Array.from(event.targetTouches).map(remapPoint) : [],
      changedTouches: changedTouches.map(remapPoint),
      isTrusted: event.isTrusted,
      _originalEvent: event,
    };

    if (event.pointerId !== undefined) {
      remapped.pointerId = event.pointerId;
      remapped.clientX = screenWidth - event.clientX;
      remapped.screenX = screen.width - event.screenX;
    }

    return remapped;
  }

  /** 리소스 정리 */
  destroy() {
    if (this._enabled) {
      this.container.classList.remove('mirrored');
      this._enabled = false;
    }
    this.container = null;
  }
}

window.MirrorEngine = MirrorEngine;

  <script>
/**
 * HUD Widgets — 헤드업 디스플레이 위젯 모음
 * 시계, 나침반, 속도, 고도, 주행거리 위젯 관리
 */

// ===== 시계 위젯: HH:MM 표시 (운전 중 가독성 위해 초 제외) =====
class ClockWidget {
  constructor(el) {
    this.el = el;
    this._interval = null;
  }

  start() {
    this._update();
    this._interval = setInterval(() => this._update(), 10000); // 10초마다 갱신
  }

  stop() {
    if (this._interval) {
      clearInterval(this._interval);
      this._interval = null;
    }
  }

  _update() {
    if (!this.el) return;
    const now = new Date();
    const hh = String(now.getHours()).padStart(2, '0');
    const mm = String(now.getMinutes()).padStart(2, '0');
    this.el.textContent = `${hh}:${mm}`;
  }
}

// ===== 나침반 위젯: 방위각 표시 (iOS 13+ 권한 요청 포함) =====
class CompassWidget {
  constructor(el) {
    this.el = el;
    this._heading = null;
    this._onOrientation = null;
    this._started = false;
  }

  async start() {
    if (this._started) return;
    this._started = true;

    // iOS 13+에서는 명시적 권한 요청 필요
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const perm = await DeviceOrientationEvent.requestPermission();
        if (perm !== 'granted') {
          console.warn('나침반 권한 거부됨');
          return;
        }
      } catch (e) {
        console.warn('DeviceOrientationEvent 권한 요청 실패:', e);
        return;
      }
    }

    this._onOrientation = (e) => {
      // webkitCompassHeading (iOS) 또는 alpha (Android) 사용
      let heading = null;
      if (e.webkitCompassHeading !== undefined && e.webkitCompassHeading !== null) {
        heading = e.webkitCompassHeading;
      } else if (e.alpha !== null && e.alpha !== undefined) {
        // Android alpha는 0~360 (북쪽 기준 시계방향)
        heading = e.alpha;
      }

      // 유효한 방위각만 업데이트 (jitter 방지)
      if (heading !== null && !isNaN(heading)) {
        this._heading = Math.round(heading);
        this._render();
      }
    };

    window.addEventListener('deviceorientation', this._onOrientation, true);
  }

  stop() {
    if (this._onOrientation) {
      window.removeEventListener('deviceorientation', this._onOrientation, true);
      this._onOrientation = null;
    }
    this._started = false;
  }

  getHeading() {
    return this._heading;
  }

  _render() {
    if (!this.el) return;
    this.el.textContent = `${this._heading}°`;
  }
}

// ===== 속도 위젯: km/h 표시 (정지 시 -- 표시로 jitter 방지) =====
class SpeedWidget {
  constructor(el) {
    this.el = el;
    this._speed = 0;
    this._threshold = 3; // km/h 미만은 -- 표시
  }

  update(coords) {
    if (!this.el) return;
    if (coords && coords.speed !== null && coords.speed !== undefined) {
      this._speed = coords.speed * 3.6; // m/s → km/h
    }
    this._render();
  }

  /** 외부에서 속도값 직접 설정 (GPS speed가 없을 때 대비) */
  setSpeed(kmh) {
    this._speed = kmh;
    this._render();
  }

  getSpeed() {
    return this._speed;
  }

  _render() {
    if (!this.el) return;
    if (this._speed < this._threshold) {
      this.el.textContent = '--';
    } else {
      this.el.textContent = Math.round(this._speed);
    }
  }
}

// ===== 고도 위젯: GPS 고도 표시 (m) =====
class AltitudeWidget {
  constructor(el) {
    this.el = el;
    this._altitude = null;
  }

  update(coords) {
    if (!this.el) return;
    if (coords && coords.altitude !== null && coords.altitude !== undefined && !isNaN(coords.altitude)) {
      this._altitude = coords.altitude;
      this.el.textContent = `${Math.round(this._altitude)}m`;
      this.el.style.display = '';
    } else {
      this._altitude = null;
      this.el.textContent = '--m';
      // 고도 정보 없으면 숨김
      this.el.style.display = 'none';
    }
  }

  getAltitude() {
    return this._altitude;
  }
}

// ===== 주행 정보 위젯: 누적 거리 + 경과 시간 =====
class TripWidget {
  constructor(distanceEl, timeEl, infoEl) {
    this.distanceEl = distanceEl;
    this.timeEl = timeEl;
    this.infoEl = infoEl; // #trip-info 컨테이너
    this._active = false;
    this._distance = 0; // 미터 단위
    this._startTime = null;
    this._timerInterval = null;
    this._lastPos = null;
  }

  start() {
    this._active = true;
    this._distance = 0;
    this._startTime = Date.now();
    this._lastPos = null;
    this._renderDistance();
    this._renderTime();
    if (this.infoEl) this.infoEl.style.display = '';
    this._timerInterval = setInterval(() => this._renderTime(), 1000);
  }

  stop() {
    this._active = false;
    if (this._timerInterval) {
      clearInterval(this._timerInterval);
      this._timerInterval = null;
    }
  }

  reset() {
    this.stop();
    this._distance = 0;
    this._startTime = null;
    this._lastPos = null;
    this._renderDistance();
    this._renderTime();
    if (this.infoEl) this.infoEl.style.display = 'none';
  }

  isActive() {
    return this._active;
  }

  /** GPS 위치 업데이트 시 호출 — Haversine 공식으로 거리 누적 */
  updatePosition(coords) {
    if (!this._active || !coords) return;

    const lat = coords.latitude;
    const lon = coords.longitude;
    if (lat === null || lon === null) return;

    if (this._lastPos) {
      const d = this._haversine(this._lastPos.lat, this._lastPos.lon, lat, lon);
      // GPS 오차로 인한 비정상적 점프 필터링 (한 번에 500m 이상 이동 무시)
      if (d < 500) {
        this._distance += d;
      }
    }

    this._lastPos = { lat, lon };
    this._renderDistance();
  }

  getDistance() {
    return this._distance;
  }

  /** Haversine 공식 — 두 위경도 간 거리(미터) 계산 */
  _haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000; // 지구 반지름 (미터)
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  _renderDistance() {
    if (!this.distanceEl) return;
    if (this._distance >= 1000) {
      this.distanceEl.textContent = `${(this._distance / 1000).toFixed(1)} km`;
    } else {
      this.distanceEl.textContent = `${Math.round(this._distance)} m`;
    }
  }

  _renderTime() {
    if (!this.timeEl) return;
    if (!this._startTime) {
      this.timeEl.textContent = '00:00';
      return;
    }
    const elapsed = Math.floor((Date.now() - this._startTime) / 1000);
    const h = Math.floor(elapsed / 3600);
    const m = Math.floor((elapsed % 3600) / 60);
    const s = elapsed % 60;
    if (h > 0) {
      this.timeEl.textContent = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    } else {
      this.timeEl.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }
  }
}

// ===== HUD 위젯 관리자 — 모든 위젯 오케스트레이션 =====
class HudWidgetsManager {
  constructor() {
    // DOM 요소 참조
    this.clockEl = document.getElementById('clock-value');
    this.compassEl = document.getElementById('compass-value');
    this.speedEl = document.getElementById('speed-value');
    this.altitudeEl = document.getElementById('altitude-value');
    this.tripDistEl = document.getElementById('trip-distance');
    this.tripTimeEl = document.getElementById('trip-time');
    this.tripInfoEl = document.getElementById('trip-info');

    // 위젯 인스턴스 생성
    this.clock = new ClockWidget(this.clockEl);
    this.compass = new CompassWidget(this.compassEl);
    this.speed = new SpeedWidget(this.speedEl);
    this.altitude = new AltitudeWidget(this.altitudeEl);
    this.trip = new TripWidget(this.tripDistEl, this.tripTimeEl, this.tripInfoEl);

    // GPS 위치 추적 ID
    this._watchId = null;
    this._running = false;
  }

  /** GPS 감시 시작 + 시계/나침반 활성화 */
  start() {
    if (this._running) return;
    this._running = true;

    this.clock.start();
    this.compass.start();

    // GPS 위치 감시
    if ('geolocation' in navigator) {
      this._watchId = navigator.geolocation.watchPosition(
        (pos) => this._onPosition(pos),
        (err) => console.warn('GPS 오류:', err.message),
        { enableHighAccuracy: true, maximumAge: 2000, timeout: 10000 }
      );
    }
  }

  /** 모든 위젯 정지 + GPS 해제 */
  stop() {
    this._running = false;

    this.clock.stop();
    this.compass.stop();

    if (this._watchId !== null) {
      navigator.geolocation.clearWatch(this._watchId);
      this._watchId = null;
    }
  }

  /** 주행 기록 시작/정지 토글 */
  toggleTrip() {
    if (this.trip.isActive()) {
      this.trip.stop();
    } else {
      this.trip.start();
      // GPS가 아직 시작되지 않았다면 함께 시작
      if (!this._running) this.start();
    }
    return this.trip.isActive();
  }

  isRunning() {
    return this._running;
  }

  /** GPS 위치 콜백 */
  _onPosition(pos) {
    const coords = pos.coords;

    // 속도 위젯 업데이트
    this.speed.update(coords);

    // 고도 위젯 업데이트
    this.altitude.update(coords);

    // 주행 거리 업데이트
    this.trip.updatePosition(coords);

    // 외부로 위치 이벤트 전달 (맵 위젯 등에서 활용)
    const event = new CustomEvent('gpsposition', {
      detail: {
        latitude: coords.latitude,
        longitude: coords.longitude,
        accuracy: coords.accuracy,
        altitude: coords.altitude,
        speed: coords.speed,
        heading: coords.heading
      }
    });
    document.dispatchEvent(event);
  }

  /** 현재 속도(km/h) 반환 */
  getSpeed() {
    return this.speed.getSpeed();
  }

  /** 현재 나침반 방위각 반환 */
  getHeading() {
    return this.compass.getHeading();
  }

  /** 리소스 정리 */
  destroy() {
    this.stop();
    this.trip.reset();
  }
}

window.ClockWidget = ClockWidget;
window.CompassWidget = CompassWidget;
window.SpeedWidget = SpeedWidget;
window.AltitudeWidget = AltitudeWidget;
window.TripWidget = TripWidget;
window.HudWidgetsManager = HudWidgetsManager;

    const mapEl = document.getElementById('map');
    if (!mapEl) return;

    // 나침반 heading을 지도 회전각으로 변환 (heading 방향이 위로 오도록)
    const rotation = -heading;
    mapEl.style.transition = 'transform 300ms ease';
    mapEl.style.transform = `rotate(${rotation}deg)`;
    mapEl.style.transformOrigin = 'center center';
  }

  /** 사용자가 지도를 드래그하면 자동 회전 일시 해제 */
  _onUserDragStart() {
    if (!this._mapRotationEnabled) return;

    this._mapRotationEnabled = false;
    console.log('사용자 드래그 — 지도 자동 회전 일시 해제');

    // 10초 후 자동 회전 재활성화
    if (this._userRotationTimeout) {
      clearTimeout(this._userRotationTimeout);
    }
    this._userRotationTimeout = setTimeout(() => {
      this._mapRotationEnabled = true;
      console.log('지도 자동 회전 재활성화');
      // 현재 heading으로 즉시 회전
      if (this._currentHeading !== null) {
        this._applyMapRotation(this._currentHeading);
      }
    }, 10000);
  }

  /** 지도 회전 수동 재활성화 */
  enableMapRotation() {
    this._mapRotationEnabled = true;
    if (this._userRotationTimeout) {
      clearTimeout(this._userRotationTimeout);
      this._userRotationTimeout = null;
    }
    if (this._currentHeading !== null) {
      this._applyMapRotation(this._currentHeading);
    }
  }

  // ==========================================
  // 목적지 검색 (카카오 Places)
  // ==========================================

  /** 목적지 검색 */
  _handleSearch(e) {
    e.preventDefault();
    const input = document.getElementById('search-input');
    const resultsDiv = document.getElementById('search-results');
    if (!input || !resultsDiv) return;

    const query = input.value.trim();
    if (!query) return;

    resultsDiv.innerHTML = '<div class="search-result-item" style="color:#888">검색 중...</div>';

    if (!this._placesService) {
      resultsDiv.innerHTML = '<div class="search-result-item" style="color:#ff4444">검색 서비스를 사용할 수 없습니다</div>';
      return;
    }

    this._placesService.keywordSearch(query, (data, status) => {
      if (status === kakao.maps.services.Status.OK) {
        if (!data || data.length === 0) {
          resultsDiv.innerHTML = '<div class="search-result-item" style="color:#888">검색 결과가 없습니다</div>';
          return;
        }

        resultsDiv.innerHTML = data.map((item, idx) => `
          <div class="search-result-item" data-lat="${item.y}" data-lon="${item.x}" data-idx="${idx}">
            <div class="search-result-name">${this._escapeHtml(item.place_name)}</div>
            <div class="search-result-addr">${this._escapeHtml(item.road_address_name || item.address_name)}</div>
          </div>
        `).join('');
      } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
        resultsDiv.innerHTML = '<div class="search-result-item" style="color:#888">검색 결과가 없습니다</div>';
      } else {
        console.error('카카오 Places 검색 오류:', status);
        resultsDiv.innerHTML = '<div class="search-result-item" style="color:#ff4444">검색 실패</div>';
      }
    });
  }

  /** 검색 결과 항목 클릭 처리 */
  _onResultClick(e) {
    const item = e.target.closest('.search-result-item');
    if (!item) return;

    const lat = parseFloat(item.dataset.lat);
    const lon = parseFloat(item.dataset.lon);
    if (isNaN(lat) || isNaN(lon)) return;

    // 지도 이동
    if (this.map) {
      this.map.setLevel(3);
      this.map.panTo(new kakao.maps.LatLng(lat, lon));
    }

    // 기존 목적지 마커/경로 제거
    this._clearDestination();

    // 기존 네비게이션 중지
    this._stopNavigation();

    // 목적지 마커 추가 (커스텀 오버레이)
    const destContent = '<div style="width:12px;height:12px;background:#ff4444;border-radius:50%;border:2px solid #fff;box-shadow:0 0 8px rgba(255,68,68,0.8)"></div>';
    this._destOverlay = new kakao.maps.CustomOverlay({
      position: new kakao.maps.LatLng(lat, lon),
      content: destContent,
      map: this.map,
      zIndex: 50
    });

    // 현재 위치에서 경로 탐색
    if (this._userPos) {
      this._fetchRoute(this._userPos[1], this._userPos[0], lon, lat);
    }

    // 검색 패널 닫기
    this.hideSearch();
  }

  // ==========================================
  // 경로 탐색 (카카오 Directions → OSRM 폴백)
  // ==========================================

  /** 경로 탐색 — 카카오 Directions API 우선, 실패 시 OSRM 폴백 */
  async _fetchRoute(fromLon, fromLat, toLon, toLat) {
    try {
      // 1. 카카오 Directions API 시도
      const kakaoSuccess = await this._fetchKakaoRoute(fromLon, fromLat, toLon, toLat);
      if (!kakaoSuccess) {
        // 2. 카카오 실패 시 OSRM 폴백
        console.log('카카오 Directions 실패 — OSRM으로 폴백');
        await this._fetchOsrmRoute(fromLon, fromLat, toLon, toLat);
      }
    } catch (err) {
      console.error('경로 탐색 오류:', err);
    }
  }

  /** 카카오 Directions REST API로 경로 탐색 */
  async _fetchKakaoRoute(fromLon, fromLat, toLon, toLat) {
    try {
      const url = `https://apis-navi.kakao.com/v1/directions?origin=${fromLon},${fromLat}&destination=${toLon},${toLat}&priority=RECOMMEND&car_type=8&alternatives=false`;
      const resp = await fetch(url, {
        headers: { 'Authorization': 'KakaoAK e9562b51a309f295c4407b63c7efd644' }
      });

      if (!resp.ok) {
        if (resp.status === 403) {
          console.warn('카카오 Directions API 403 — 길찾기 권한이 없습니다. OSRM으로 폴백합니다.');
        } else {
          console.warn(`카카오 Directions API 오류: ${resp.status}`);
        }
        return false;
      }

      const data = await resp.json();

      if (!data.routes || data.routes.length === 0) {
        console.warn('카카오: 경로를 찾을 수 없습니다');
        return false;
      }

      const route = data.routes[0];
      const summary = route.summary;

      // 경로선 그리기
      const path = [];
      const allGuides = [];

      for (const section of route.sections) {
        for (const road of section.roads) {
          // vertexes: [lng, lat, lng, lat, ...]
          const vertexes = road.vertexes;
          for (let i = 0; i < vertexes.length; i += 2) {
            path.push(new kakao.maps.LatLng(vertexes[i + 1], vertexes[i]));
          }

          // guides에서 턴바이턴 정보 수집
          if (road.guides) {
            for (const guide of road.guides) {
              allGuides.push(guide);
            }
          }
        }
      }

      if (path.length === 0) {
        console.warn('카카오: 경로 좌표가 없습니다');
        return false;
      }

      // 경로선 표시
      this._drawRouteLine(path);

      // 지도 영역을 경로에 맞게 조정
      const bounds = new kakao.maps.LatLngBounds();
      for (const p of path) {
        bounds.extend(p);
      }
      this.map.setBounds(bounds, 50, 50, 50, 50);

      // 네비게이션 step 정보 설정 (카카오 guides 기반)
      this._navSteps = this._parseKakaoGuides(allGuides);
      this._currentStepIndex = 0;
      this._navTotal = {
        distance: summary.distance,  // 미터
        duration: summary.duration   // 초
      };
      this._navStartTime = Date.now();
      this._routeSource = 'kakao';

      // 네비게이션 시작
      this._startNavigation();

      console.log(`카카오 경로 탐색 성공: ${this._navSteps.length}단계, 총 거리 ${this._formatDistance(this._navTotal.distance)}`);
      return true;

    } catch (err) {
      console.error('카카오 Directions API 오류:', err);
      return false;
    }
  }

  /** 카카오 guides 배열을 네비게이션 step 형식으로 변환 */
  _parseKakaoGuides(guides) {
    // guides 배열을 내부 네비게이션 step 형식으로 변환
    // 각 guide: { type, distance, duration, road_name, guidance, x, y }
    return guides.map((guide, idx) => ({
      type: guide.type,
      icon: this._kakaoGuideTypeMap[guide.type] ? this._kakaoGuideTypeMap[guide.type].icon : '⬆️',
      text: this._kakaoGuideTypeMap[guide.type] ? this._kakaoGuideTypeMap[guide.type].text : guide.guidance || '직진',
      guidance: guide.guidance || '',
      roadName: guide.road_name || '',
      distance: guide.distance || 0,
      duration: guide.duration || 0,
      lat: guide.y ? parseFloat(guide.y) : null,
      lng: guide.x ? parseFloat(guide.x) : null
    }));
  }

  /** OSRM 경로 탐색 (폴백) */
  async _fetchOsrmRoute(fromLon, fromLat, toLon, toLat) {
    try {
      const url = `https://router.project-osrm.org/route/v1/driving/${fromLon},${fromLat};${toLon},${toLat}?overview=full&geometries=geojson&steps=true`;
      const resp = await fetch(url, {
        headers: { 'User-Agent': 'HudMirrorPWA/2.0' }
      });
      const data = await resp.json();

      if (!data.routes || data.routes.length === 0) {
        console.warn('OSRM: 경로를 찾을 수 없습니다');
        return;
      }

      const route = data.routes[0];
      const coords = route.geometry.coordinates.map(c => new kakao.maps.LatLng(c[1], c[0])); // [lon,lat] → LatLng

      // 경로선 표시
      this._drawRouteLine(coords);

      // 지도 영역 조정
      const bounds = new kakao.maps.LatLngBounds();
      for (const c of coords) {
        bounds.extend(c);
      }
      this.map.setBounds(bounds, 50, 50, 50, 50);

      // 네비게이션 step 정보 추출
      if (route.legs && route.legs.length > 0) {
        const allSteps = [];
        for (const leg of route.legs) {
          if (leg.steps && leg.steps.length > 0) {
            allSteps.push(...leg.steps);
          }
        }

        if (allSteps.length > 0) {
          // OSRM steps를 내부 형식으로 변환
          this._navSteps = this._parseOsrmSteps(allSteps);
          this._currentStepIndex = 0;
          this._navTotal = {
            distance: route.distance,
            duration: route.duration
          };
          this._navStartTime = Date.now();
          this._routeSource = 'osrm';

          this._startNavigation();
        }
      }
    } catch (err) {
      console.error('OSRM 경로 탐색 오류:', err);
    }
  }

  /** OSRM steps를 내부 네비게이션 형식으로 변환 */
  _parseOsrmSteps(steps) {
    return steps.map((step) => {
      const maneuver = step.maneuver;
      let icon = '⬆️';
      let text = '직진';

      // 특수 maneuver type 처리
      if (this._specialManeuverMap[maneuver.type]) {
        text = this._specialManeuverMap[maneuver.type];
        const typeIcons = {
          'arrive': '🏁', 'depart': '🚗',
          'roundabout': '🔄', 'rotary': '🔄',
          'fork': '⑂', 'merge': '⤴️'
        };
        icon = typeIcons[maneuver.type] || '⬆️';
        if (this._maneuverMap[maneuver.modifier]) {
          icon = this._maneuverMap[maneuver.modifier].icon;
        }
      } else if (this._maneuverMap[maneuver.modifier]) {
        icon = this._maneuverMap[maneuver.modifier].icon;
        text = this._maneuverMap[maneuver.modifier].text;
      }

      // step의 마지막 좌표 (목표점)
      let lat = null, lng = null;
      if (step.geometry && step.geometry.coordinates) {
        const lastCoord = step.geometry.coordinates[step.geometry.coordinates.length - 1];
        lng = lastCoord[0];
        lat = lastCoord[1];
      }

      return {
        type: maneuver.type,
        icon: icon,
        text: text,
        guidance: text,
        roadName: step.name || '',
        distance: step.distance || 0,
        duration: step.duration || 0,
        lat: lat,
        lng: lng
      };
    });
  }

  /** 경로선 지도에 표시 */
  _drawRouteLine(path) {
    this.routeLine = new kakao.maps.Polyline({
      path: path,
      map: this.map,
      strokeWeight: 6,
      strokeColor: '#00d4ff',
      strokeOpacity: 0.8,
      strokeStyle: 'solid'
    });
  }

  // ==========================================
  // 턴바이턴 네비게이션
  // ==========================================

  /** 네비게이션 시작 — UI 표시 및 초기 상태 설정 */
  _startNavigation() {
    if (!this._navSteps || this._navSteps.length === 0) return;

    // 네비게이션 배너 표시
    const navBanner = document.getElementById('nav-banner');
    if (navBanner) navBanner.style.display = '';

    // nav-active 클래스 추가
    const app = document.getElementById('app');
    if (app) app.classList.add('nav-active');

    // 지도 회전 활성화
    this.enableMapRotation();

    // 첫 step 표시
    this._currentStepIndex = 0;
    this._updateNavDisplay();

    console.log(`네비게이션 시작: ${this._navSteps.length}단계, 총 거리 ${this._formatDistance(this._navTotal.distance)}`);
  }

  /** 네비게이션 표시 업데이트 */
  _updateNavDisplay() {
    if (!this._navSteps || this._currentStepIndex >= this._navSteps.length) return;

    const step = this._navSteps[this._currentStepIndex];

    // 다음 step이 있고 현재 step이 출발/유지이면 다음 step을 표시
    let displayStep = step;
    if (this._routeSource === 'osrm') {
      if ((step.type === 'depart' || step.type === 'new name') &&
          this._currentStepIndex + 1 < this._navSteps.length) {
        displayStep = this._navSteps[this._currentStepIndex + 1];
      }
    } else {
      // 카카오: type 0(출발) 또는 type 1(유지)이면 다음 step 표시
      if ((step.type === 0 || step.type === 1) &&
          this._currentStepIndex + 1 < this._navSteps.length) {
        displayStep = this._navSteps[this._currentStepIndex + 1];
      }
    }

    // 아이콘과 지시문
    let icon = displayStep.icon || '⬆️';
    let instruction = displayStep.text || displayStep.guidance || '직진';

    // 목적지 도착인지 확인
    const isArrival = (this._routeSource === 'kakao' && displayStep.type === 100) ||
                      (this._routeSource === 'osrm' && displayStep.type === 'arrive');

    // 도로명
    const roadName = displayStep.roadName || '';

    // 다음 방향 전환까지 남은 거리
    let distToNext = step.distance || 0;

    // 남은 전체 거리 및 ETA 계산
    let remainingDist = 0;
    let remainingDuration = 0;

    if (this._navTotal) {
      // 지나온 step들의 거리를 합산
      let coveredDist = 0;
      for (let i = 0; i < this._currentStepIndex; i++) {
        coveredDist += this._navSteps[i].distance || 0;
      }

      remainingDist = Math.max(0, this._navTotal.distance - coveredDist);

      if (this._navStartTime) {
        const elapsed = (Date.now() - this._navStartTime) / 1000;
        remainingDuration = Math.max(0, this._navTotal.duration - elapsed);
      } else {
        remainingDuration = this._navTotal.duration;
      }
    }

    // DOM 업데이트
    const navIconEl = document.getElementById('nav-icon');
    const navInstructionEl = document.getElementById('nav-instruction');
    const navRoadEl = document.getElementById('nav-road');
    const navDistanceEl = document.getElementById('nav-distance');
    const navEtaTimeEl = document.getElementById('nav-eta-time');

    if (navIconEl) navIconEl.textContent = icon;
    if (navInstructionEl) navInstructionEl.textContent = instruction;
    if (navRoadEl) navRoadEl.textContent = roadName || '도로 정보 없음';
    if (navDistanceEl) navDistanceEl.textContent = this._formatDistance(distToNext);
    if (navEtaTimeEl) navEtaTimeEl.textContent = this._formatDuration(remainingDuration);

    // 접근 경고 업데이트
    this._updateApproachWarning(distToNext, instruction, icon);
  }

  /** 접근 경고 표시/숨김 (200m 이내) */
  _updateApproachWarning(distToNext, instruction, icon) {
    const approachEl = document.getElementById('nav-approach');
    const approachDistEl = document.getElementById('nav-approach-distance');
    const approachInstrEl = document.getElementById('nav-approach-instruction');

    if (!approachEl) return;

    if (distToNext < 200 && distToNext > 0 && instruction !== '목적지 도착' && instruction !== '도착') {
      if (approachDistEl) approachDistEl.textContent = this._formatDistance(distToNext);
      if (approachInstrEl) approachInstrEl.textContent = instruction;
      approachEl.classList.add('active');
    } else {
      approachEl.classList.remove('active');
    }
  }

  /** 네비게이션 step 전진 — GPS 위치 기반 */
  _advanceNavStep() {
    if (!this._navSteps || !this._userPos) return;

    const currentStep = this._navSteps[this._currentStepIndex];
    if (!currentStep) return;

    // step의 목표 좌표
    const targetLat = currentStep.lat;
    const targetLng = currentStep.lng;

    if (targetLat == null || targetLng == null) return;

    // Haversine 거리 계산
    const dist = this._haversine(
      this._userPos[0], this._userPos[1],
      targetLat, targetLng
    );

    // 30m 이내에 도달하면 다음 step으로 전진
    if (dist < 30) {
      // 마지막 step (도착)인지 확인
      if (this._currentStepIndex >= this._navSteps.length - 1) {
        this._onArrival();
        return;
      }

      this._currentStepIndex++;
      console.log(`네비게이션 step 전진: ${this._currentStepIndex}/${this._navSteps.length}`);

      // 새 step 표시 업데이트
      this._updateNavDisplay();
    }
  }

  /** 목적지 도착 처리 */
  _onArrival() {
    console.log('목적지 도착!');

    // 도착 표시 업데이트
    const navIconEl = document.getElementById('nav-icon');
    const navInstructionEl = document.getElementById('nav-instruction');
    const navRoadEl = document.getElementById('nav-road');
    const navDistanceEl = document.getElementById('nav-distance');
    const navEtaTimeEl = document.getElementById('nav-eta-time');

    if (navIconEl) navIconEl.textContent = '🏁';
    if (navInstructionEl) navInstructionEl.textContent = '목적지 도착!';
    if (navRoadEl) navRoadEl.textContent = '';
    if (navDistanceEl) navDistanceEl.textContent = '';
    if (navEtaTimeEl) navEtaTimeEl.textContent = '';

    // 접근 경고 숨김
    const approachEl = document.getElementById('nav-approach');
    if (approachEl) approachEl.classList.remove('active');

    // 5초 후 네비게이션 자동 종료
    if (this._arrivalTimeout) clearTimeout(this._arrivalTimeout);
    this._arrivalTimeout = setTimeout(() => {
      this._stopNavigation();
      this._arrivalTimeout = null;
    }, 5000);
  }

  /** 네비게이션 중지 */
  _stopNavigation() {
    // 도착 자동 종료 타이머 정리
    if (this._arrivalTimeout) {
      clearTimeout(this._arrivalTimeout);
      this._arrivalTimeout = null;
    }

    // 네비게이션 배너 숨김
    const navBanner = document.getElementById('nav-banner');
    if (navBanner) navBanner.style.display = 'none';

    // 접근 경고 숨김
    const approachEl = document.getElementById('nav-approach');
    if (approachEl) approachEl.classList.remove('active');

    // nav-active 클래스 제거
    const app = document.getElementById('app');
    if (app) app.classList.remove('nav-active');

    // 네비게이션 상태 초기화
    this._navSteps = null;
    this._currentStepIndex = 0;
    this._navTotal = null;
    this._navStartTime = null;
    this._routeSource = null;

    // 경로선과 목적지 마커는 유지 (사용자가 확인 가능)
    console.log('네비게이션 중지');
  }

  // ==========================================
  // 유틸리티
  // ==========================================

  /** 거리 포맷팅 — "XXXm" (< 1km) 또는 "X.Xkm" (>= 1km) */
  _formatDistance(meters) {
    if (meters == null || isNaN(meters)) return '--';
    if (meters >= 1000) {
      return `${(meters / 1000).toFixed(1)}km`;
    }
    return `${Math.round(meters)}m`;
  }

  /** 시간 포맷팅 — "XX분" 또는 "X시간 XX분" */
  _formatDuration(seconds) {
    if (seconds == null || isNaN(seconds) || seconds <= 0) return '--';
    const totalMinutes = Math.ceil(seconds / 60);
    if (totalMinutes >= 60) {
      const h = Math.floor(totalMinutes / 60);
      const m = totalMinutes % 60;
      return m > 0 ? `${h}시간 ${m}분` : `${h}시간`;
    }
    return `${totalMinutes}분`;
  }

  /** Haversine 공식 — 두 위경도 간 거리(미터) 계산 */
  _haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000; // 지구 반지름 (미터)
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  /** 목적지 마커 및 경로 제거 */
  _clearDestination() {
    if (this._destOverlay) {
      this._destOverlay.setMap(null);
      this._destOverlay = null;
    }
    if (this._userOverlay) {
      this._userOverlay.setMap(null);
      this._userOverlay = null;
    }
    if (this.routeLine) {
      this.routeLine.setMap(null);
      this.routeLine = null;
    }
  }

  /** HTML 이스케이프 (XSS 방지) */
  _escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  /** 사용자 위치 반환 */
  getUserPosition() {
    return this._userPos;
  }

  /** 네비게이션 활성 상태 반환 */
  isNavigating() {
    return this._navSteps !== null && this._navSteps.length > 0;
  }

  /** 이벤트 리스너 정리 */
  destroy() {
    // GPS 이벤트 해제
    if (this._onGpsPosition) {
      document.removeEventListener('gpsposition', this._onGpsPosition);
    }

    // 검색 이벤트 해제
    const searchForm = document.getElementById('search-form');
    const searchClose = document.getElementById('search-close');
    const searchResults = document.getElementById('search-results');

    if (searchForm) searchForm.removeEventListener('submit', this._onSearchSubmit);
    if (searchClose) searchClose.removeEventListener('click', this._onSearchClose);
    if (searchResults) searchResults.removeEventListener('click', this._onSearchResultClick);

    // 나침반 이벤트 해제
    if (this._onCompassUpdate) {
      document.removeEventListener('deviceorientation', this._onCompassUpdate, true);
    }

    // 회전 타이머 정리
    if (this._userRotationTimeout) {
      clearTimeout(this._userRotationTimeout);
      this._userRotationTimeout = null;
    }

    // 도착 타이머 정리
    if (this._arrivalTimeout) {
      clearTimeout(this._arrivalTimeout);
      this._arrivalTimeout = null;
    }

    // 오버레이/경로선 제거
    this._clearDestination();

    // 지도 제거 (카카오맵은 명시적인 destroy 메서드 없음)
    this.map = null;
  }
}

window.MapWidget = MapWidget;

  </script>
  <script>
/**
 * HUD Mirror — 메인 애플리케이션 컨트롤러
 * MirrorEngine, HudWidgetsManager, MapWidget 오케스트레이션
 */

class HudApp {
  constructor() {
    this.mirror = null;
    this.widgets = null;
    this.mapWidget = null;
    this.isHudMode = false;
    this.brightness = 1.0;
    this._autoHudSpeedThreshold = 20; // km/h 이상에서 자동 HUD 모드 진입
    this._autoHudCooldown = false;
  }

  init() {
    // 미러 엔진 초기화 (#app 컨테이너에 적용)
    this.mirror = new MirrorEngine(document.getElementById('app'));

    // 위젯 매니저 초기화
    this.widgets = new HudWidgetsManager();

    // 지도 위젯 초기화
    this.mapWidget = new MapWidget();
    this.mapWidget.init();

    // 이벤트 연결
    this.setupEvents();

    // 설정 복원
    this.loadSettings();

    // 첫 방문 안전 경고
    this.checkFirstVisit();

    // GPS 속도 기반 자동 HUD 모드 감시
    this._watchAutoHud();
  }

  setupEvents() {
    // 반전 토글
    const btnMirror = document.getElementById('btn-mirror');
    if (btnMirror) {
      btnMirror.addEventListener('click', () => this.toggleMirror());
    }

    // HUD 모드 토글
    const btnHud = document.getElementById('btn-hud-mode');
    if (btnHud) {
      btnHud.addEventListener('click', () => this.toggleHudMode());
    }

    // 검색 버튼
    const btnSearch = document.getElementById('btn-search');
    if (btnSearch) {
      btnSearch.addEventListener('click', () => this.mapWidget.toggleSearch());
    }

    // 밝기 슬라이더
    const brightnessSlider = document.getElementById('brightness-slider');
    if (brightnessSlider) {
      brightnessSlider.addEventListener('input', (e) => {
        this.setBrightness(parseFloat(e.target.value));
      });
    }

    // 안전 경고 확인
    const safetyOk = document.getElementById('safety-ok');
    if (safetyOk) {
      safetyOk.addEventListener('click', () => {
        const overlay = document.getElementById('safety-overlay');
        if (overlay) overlay.style.display = 'none';
        try { localStorage.setItem('hud-mirror-visited', 'true'); } catch(e) {}
      });
    }

    // 네비게이션 중지 버튼
    const navStop = document.getElementById('nav-stop');
    if (navStop) {
      navStop.addEventListener('click', () => {
        if (this.mapWidget && this.mapWidget.isNavigating()) {
          this.mapWidget._stopNavigation();
        }
      });
    }
  }

  /** 좌우 반전 토글 */
  toggleMirror() {
    const enabled = this.mirror.toggle();
    const app = document.getElementById('app');
    if (enabled) {
      app.classList.add('mirror-active');
    } else {
      app.classList.remove('mirror-active');
    }
    this.saveSettings();
  }

  /** HUD 모드 토글 — 속도 오버레이, 주행 추적, 자동 반전 활성화 */
  toggleHudMode() {
    this.isHudMode = !this.isHudMode;
    const app = document.getElementById('app');
    const btnHud = document.getElementById('btn-hud-mode');

    if (this.isHudMode) {
      app.classList.add('hud-mode');

      // 위젯 시작 (GPS, 시계, 나침반)
      this.widgets.start();

      // 주행 기록 시작
      this.widgets.trip.start();

      // 속도 오버레이 표시 (CSS .hud-mode가 처리)
      const speedOverlay = document.getElementById('speed-overlay');
      if (speedOverlay) speedOverlay.style.display = '';

      // 주행 정보 표시
      const tripInfo = document.getElementById('trip-info');
      if (tripInfo) tripInfo.style.display = '';

      // 고도 표시
      const altEl = document.getElementById('altitude-value');
      if (altEl) altEl.style.display = '';

      // 자동으로 반전 활성화
      if (!this.mirror.isEnabled()) {
        this.toggleMirror();
      }

      if (btnHud) btnHud.textContent = '🖥️ 일반';

      // 지도 크기 갱신
      this.mapWidget.invalidateSize();
    } else {
      app.classList.remove('hud-mode');

      // 위젯 정지
      this.widgets.stop();

      // 주행 기록 정지 (데이터 유지)
      this.widgets.trip.stop();

      // 속도 오버레이 숨김
      const speedOverlay = document.getElementById('speed-overlay');
      if (speedOverlay) speedOverlay.style.display = 'none';

      // 주행 정보 숨김
      const tripInfo = document.getElementById('trip-info');
      if (tripInfo) tripInfo.style.display = 'none';

      if (btnHud) btnHud.textContent = '🖥️ HUD';
    }

    this.saveSettings();
  }

  /** 밝기 조절 */
  setBrightness(level) {
    this.brightness = level;
    const app = document.getElementById('app');
    if (app) {
      app.style.filter = `brightness(${level})`;
    }
    this.saveSettings();
  }

  /** GPS 속도 기반 자동 HUD 모드 진입 */
  _watchAutoHud() {
    document.addEventListener('gpsposition', (e) => {
      if (this.isHudMode || this._autoHudCooldown) return;

      const speed = e.detail.speed;
      if (speed !== null && speed !== undefined) {
        const kmh = speed * 3.6;
        if (kmh >= this._autoHudSpeedThreshold) {
          console.log(`자동 HUD 모드 진입 (속도: ${Math.round(kmh)} km/h)`);
          this.toggleHudMode();
          // 쿨다운 — 중복 토글 방지
          this._autoHudCooldown = true;
          setTimeout(() => { this._autoHudCooldown = false; }, 30000);
        }
      }
    });
  }

  /** 설정 저장 (localStorage) */
  saveSettings() {
    try {
      const settings = {
        brightness: this.brightness,
        hudMode: this.isHudMode,
        mirrorEnabled: this.mirror.isEnabled()
      };
      localStorage.setItem('hud-mirror-settings', JSON.stringify(settings));
    } catch (e) {
      console.warn('설정 저장 실패:', e);
    }
  }

  /** 설정 복원 */
  loadSettings() {
    try {
      const saved = JSON.parse(localStorage.getItem('hud-mirror-settings') || '{}');

      // 밝기 복원
      if (typeof saved.brightness === 'number') {
        this.brightness = saved.brightness;
        const slider = document.getElementById('brightness-slider');
        if (slider) slider.value = saved.brightness;
        this.setBrightness(saved.brightness);
      }

      // HUD 모드 복원
      if (saved.hudMode) {
        this.toggleHudMode();
      } else if (saved.mirrorEnabled) {
        // HUD 모드가 아니면 반전 상태만 복원
        this.toggleMirror();
      }
    } catch (e) {
      console.warn('설정 복원 실패:', e);
    }
  }

  /** 첫 방문 시 안전 경고 표시 */
  checkFirstVisit() {
    if (!localStorage.getItem('hud-mirror-visited')) {
      const overlay = document.getElementById('safety-overlay');
      if (overlay) overlay.style.display = '';
    }
  }
}

// 앱 시작
window.addEventListener('DOMContentLoaded', () => new HudApp().init());

  </script>
  
  
  
  
</body>

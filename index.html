<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#000000">
  <link rel="icon" href="icons/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/main.css">
  <title>HUD Mirror</title>
</head>
<body>
  <!-- Safety Warning Overlay -->
  <div id="safety-overlay" style="display:none">
    <div class="safety-box">
      <h2>⚠️ 주의</h2>
      <p>운전 중 스마트폰 조작은 법적 제한이 있을 수 있습니다.<br>정차 시 또는 조수석에서만 사용하세요.</p>
      <button id="safety-ok">확인</button>
    </div>
  </div>

  <div id="app">
    <!-- ===== HUD Top Bar: Time + Compass (symmetric for mirror) ===== -->
    <div id="hud-top">
      <div class="hud-top-item" id="clock-widget">
        <span class="hud-top-icon">🕐</span>
        <span class="hud-top-value" id="clock-value">--:--</span>
      </div>
      <div class="hud-top-center">
        <span class="hud-top-value" id="altitude-value" style="display:none">--m</span>
      </div>
      <div class="hud-top-item" id="compass-widget">
        <span class="hud-top-value" id="compass-value">--°</span>
        <span class="hud-top-icon">🧭</span>
      </div>
    </div>

    <!-- ===== Map Area (full center) ===== -->
    <div id="map-container">
      <div id="map"></div>
      <!-- Map search overlay -->
      <div id="map-search" style="display:none">
        <div id="map-search-box">
          <form id="search-form">
            <input type="text" id="search-input" placeholder="목적지 검색..." autocomplete="off" />
            <button type="submit">🔍</button>
            <button type="button" id="search-close">✕</button>
          </form>
          <div id="search-results"></div>
        </div>
      </div>
      <!-- Speed overlay (large, centered on map) -->
      <div id="speed-overlay" style="display:none">
        <div class="speed-number" id="speed-value">--</div>
        <div class="speed-unit">km/h</div>
      </div>

      <!-- Turn-by-Turn Navigation Banner -->
      <div id="nav-banner" style="display:none">
        <div id="nav-icon" class="nav-turn-icon">⬆️</div>
        <div class="nav-info">
          <div class="nav-instruction" id="nav-instruction">--</div>
          <div class="nav-road" id="nav-road">--</div>
        </div>
        <div class="nav-eta">
          <div class="nav-distance" id="nav-distance">--</div>
          <div class="nav-eta-time" id="nav-eta-time">--</div>
        </div>
        <button id="nav-stop" class="nav-stop-btn">✕</button>
      </div>

      <!-- Navigation approach warning -->
      <div id="nav-approach">
        <div class="nav-approach-distance" id="nav-approach-distance">--</div>
        <div class="nav-approach-instruction" id="nav-approach-instruction">--</div>
      </div>
    </div>

    <!-- ===== HUD Bottom Bar: Trip info + Controls ===== -->
    <div id="hud-bottom">
      <div class="hud-bottom-info" id="trip-info" style="display:none">
        <span id="trip-distance">0.0 km</span>
        <span class="hud-sep">|</span>
        <span id="trip-time">00:00</span>
      </div>
      <div class="hud-bottom-controls">
        <button id="btn-mirror" class="hud-btn" title="좌우 반전">🔄 반전</button>
        <button id="btn-hud-mode" class="hud-btn" title="HUD 모드">🖥️ HUD</button>
        <button id="btn-search" class="hud-btn" title="목적지 검색">🔍 검색</button>
        <input type="range" id="brightness-slider" min="0.5" max="2.0" step="0.1" value="1.0" title="밝기" />
      </div>
    </div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=e9562b51a309f295c4407b63c7efd644&libraries=services"></script>
  <script src="js/mirror.js"></script>
  <script src="js/hud-widgets.js"></script>
  <script src="js/map-widget.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
